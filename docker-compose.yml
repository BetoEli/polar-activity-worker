services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: paw-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  adminer:
    image: adminer:latest
    container_name: paw-adminer
    restart: always
    depends_on:
      - sqlserver
    ports:
      - "8080:8080"

volumes:
  sqlserver_data:
